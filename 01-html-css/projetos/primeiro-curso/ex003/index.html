<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" href="imagens/icon.jpg" type="image/png">
    <title>Teste com imagens</title>
</head>
<body>
    <h1>
        Testando carga de imagens
    </h1>
    <p>
        Abaixo você vai ver uma imagem que esta na mesma pasta que este arquivo HTML.
    </p>
    <img src="imagens/html.png" alt="Icone HTML5">
    <p>
        Podemos também carregar imagens que estão em sub-pastas.
    </p>
    <img src="css.png" alt="Icone CSS3">
    <p>
        E podemos também carregar imagens de links
    </p>
    <img src="https://tipscode.com.br/uploads/2020/01/js.png" alt="Icone JavaScript">
</body>
</html>
